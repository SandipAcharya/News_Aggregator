# fly.toml app configuration file generated for backend-django on 2026-07-01T16:41:01+05:45
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'backend-django'
primary_region = 'cdg'
console_command = '/code/manage.py shell'

[build]

[deploy]
  release_command = '/bin/sh -c "python manage.py migrate --noinput && python manage.py collectstatic --noinput && python -c \"import django; django.setup(); from django.contrib.auth import get_user_model; U=get_user_model(); U.objects.filter(username=\\\"admin\\\").exists() or U.objects.create_superuser(\\\"admin\\\",\\\"admin@inpanda.com\\\",\\\"Admin@1234\\\")\""'

[env]
  PORT = '8000'

[processes]
  app = 'gunicorn core.wsgi:application --bind 0.0.0.0:8000 --workers 2'
  scraper = '/bin/sh -c "while true; do python manage.py scrape_now; sleep 900; done"'

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

[[vm]]
  memory = '256mb'
  cpus = 1
  memory_mb = 256

[[statics]]
  guest_path = '/app/staticfiles'
  url_prefix = '/static/'
