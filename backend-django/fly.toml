# fly.toml app configuration file generated for backend-django on 2026-07-01T16:41:01+05:45
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'backend-django'
primary_region = 'cdg'
console_command = '/code/manage.py shell'

[build]

[deploy]
  release_command = 'python manage.py migrate --noinput'

[env]
  PORT = '8000'

[processes]
  app = 'python manage.py runserver 0.0.0.0:8000'
  scraper = '/bin/sh -c "while true; do python manage.py scrape_now; sleep 900; done"'

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

[[vm]]
  memory = '256mb'
  cpus = 1
  memory_mb = 256

[[statics]]
  guest_path = '/code/static'
  url_prefix = '/static/'
