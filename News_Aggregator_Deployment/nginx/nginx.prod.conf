worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # ── Logging ──────────────────────────────────────────────
    access_log /var/log/nginx/access.log;
    error_log  /var/log/nginx/error.log warn;

    # ── Gzip Compression ─────────────────────────────────────
    gzip on;
    gzip_types text/plain application/json application/javascript text/css;
    gzip_min_length 1000;

    # ── Upstreams ─────────────────────────────────────────────
    upstream node_api {
        server node-api:3000;
    }

    upstream django_admin {
        server django-admin:8000;
    }

    upstream frontend {
        server frontend:80;
    }

    # ── HTTP → HTTPS Redirect ─────────────────────────────────
    server {
        listen 80;
        server_name yourdomain.com api.yourdomain.com;

        # Required for Certbot SSL renewal
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    # ── HTTPS Main Server ─────────────────────────────────────
    server {
        listen 443 ssl;
        server_name yourdomain.com api.yourdomain.com;

        ssl_certificate     /etc/nginx/ssl/fullchain.pem;
        ssl_certificate_key /etc/nginx/ssl/privkey.pem;
        ssl_protocols       TLSv1.2 TLSv1.3;

        # ── Security Headers ──────────────────────────────────
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;

        # Increase body size limit for image uploads
        client_max_body_size 10M;

        # ── Node.js API (Public) ──────────────────────────────
        location /api/ {
            proxy_pass http://node_api;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # CORS for Vercel frontend
            add_header 'Access-Control-Allow-Origin' 'https://your-app.vercel.app' always;
            add_header 'Access-Control-Allow-Methods' 'GET, POST, OPTIONS' always;
            add_header 'Access-Control-Allow-Headers' 'Authorization, Content-Type' always;

            if ($request_method = OPTIONS) {
                return 204;
            }
        }

        # ── React Frontend (Default) ──────────────────────────────
        location / {
            proxy_pass http://frontend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # ── Django Admin Panel (Staff only) ──────────────────
        location /admin/ {
            proxy_pass http://django_admin;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # ── Django Static Files ───────────────────────────────
        location /static/ {
            proxy_pass http://django_admin;
        }

        # ── Health Check ──────────────────────────────────────
        location /health {
            return 200 'OK';
            add_header Content-Type text/plain;
        }
    }
}
