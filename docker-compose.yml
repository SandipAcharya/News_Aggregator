version: '3.8'

services:
  # ----------------------------------------
  # Databases & Message Brokers
  # ----------------------------------------
  db:
    image: postgres:15
    environment:
      POSTGRES_USER: news_user
      POSTGRES_PASSWORD: news_password
      POSTGRES_DB: news_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data



  # ----------------------------------------
  # Application Services
  # ----------------------------------------
  nginx-gateway:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - frontend
      - node-api
      - django-admin


  node-api:
    build: ./backend-node
    env_file:
      - ./backend-node/.env
    environment:
      - DATABASE_URL=postgresql://news_user:news_password@db:5432/news_db
      - REDIS_URL=redis://redis:6379
      - JWT_SECRET=${JWT_SECRET:-supersecretjwtkey}
    depends_on:
      - db
      - redis

  django-admin:
    build: ./backend-django
    environment:
      - DATABASE_URL=postgresql://news_user:news_password@db:5432/news_db
      - GROQ_API_KEY=${GROQ_API_KEY}
    depends_on:
      - db

  # Lightweight Cron-like Service (Replaces Celery & RabbitMQ)
  scraper-cron:
    build: ./backend-django
    command: /bin/sh -c "while true; do python manage.py scrape_now; sleep 900; done"
    environment:
      - DATABASE_URL=postgresql://news_user:news_password@db:5432/news_db
      - GROQ_API_KEY=${GROQ_API_KEY}
    depends_on:
      - db
      - django-admin

  frontend:
    build: ./frontend
    environment:
      - VITE_API_BASE_URL=/api

volumes:
  postgres_data:
  redis_data:
