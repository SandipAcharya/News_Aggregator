version: '3.8'

services:
  # ----------------------------------------
  # Databases & Message Brokers
  # ----------------------------------------
  db:
    image: postgres:15
    environment:
      POSTGRES_USER: news_user
      POSTGRES_PASSWORD: news_password
      POSTGRES_DB: news_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  rabbitmq:
    image: rabbitmq:3-management
    ports:
      - "5672:5672"   # Queue port
      - "15672:15672" # Management UI

  # ----------------------------------------
  # Application Services
  # ----------------------------------------
  nginx-gateway:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - frontend
      - node-api
      - django-admin


  node-api:
    build: ./backend-node
    env_file:
      - ./backend-node/.env
    environment:
      - DATABASE_URL=postgresql://news_user:news_password@db:5432/news_db
      - REDIS_URL=redis://redis:6379
      - JWT_SECRET=${JWT_SECRET:-supersecretjwtkey}
    depends_on:
      - db
      - redis

  django-admin:
    build: ./backend-django
    environment:
      - DATABASE_URL=postgresql://news_user:news_password@db:5432/news_db
      - CELERY_BROKER_URL=amqp://guest:guest@rabbitmq:5672//
      - GROQ_API_KEY=${GROQ_API_KEY}
    depends_on:
      - db
      - rabbitmq

  celery-worker:
    build: ./backend-django
    command: celery -A core worker -l INFO
    environment:
      - DATABASE_URL=postgresql://news_user:news_password@db:5432/news_db
      - CELERY_BROKER_URL=amqp://guest:guest@rabbitmq:5672//
      - GROQ_API_KEY=${GROQ_API_KEY}
    depends_on:
      - db
      - rabbitmq
      - django-admin

  celery-beat:
    build: ./backend-django
    command: celery -A core beat -l INFO
    environment:
      - DATABASE_URL=postgresql://news_user:news_password@db:5432/news_db
      - CELERY_BROKER_URL=amqp://guest:guest@rabbitmq:5672//
      - GROQ_API_KEY=${GROQ_API_KEY}
    depends_on:
      - db
      - rabbitmq
      - django-admin

  frontend:
    build: ./frontend
    environment:
      - VITE_API_BASE_URL=/api

volumes:
  postgres_data:
  redis_data:
