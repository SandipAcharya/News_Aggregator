worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    upstream frontend {
        server frontend:80;
    }

    upstream node_api {
        server node-api:3000;
    }

    upstream django_admin {
        server django-admin:8000;
    }

    server {
        listen 80;
        
        # Increase body size limit for base64 image uploads
        client_max_body_size 10M;

        # Frontend React App
        location / {
            proxy_pass http://frontend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # Node.js API Gateway (Public endpoints)
        location /api/ {
            proxy_pass http://node_api;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            
            # CORS headers can be handled by Node or Nginx
        }

        # Django Admin Panel & Static Files (Private / Staff only)
        location /admin/ {
            proxy_pass http://django_admin;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        location /static/ {
            proxy_pass http://django_admin;
        }
    }
}
